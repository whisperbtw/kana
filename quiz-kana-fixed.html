<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Hiragana & Katakana</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Space+Mono:wght@400;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg: #fef7f4;
      --card: #ffffff;
      --text: #1a1a1a;
      --primary: #e63946;
      --secondary: #f4a261;
      --success: #06d6a0;
      --error: #ef476f;
      --border: #e5e5e5;
      --shadow: rgba(0, 0, 0, 0.08);
    }
    
    .dark {
      --bg: #0f0f1e;
      --card: #1a1a2e;
      --text: #f0f0f0;
      --primary: #ff6b6b;
      --secondary: #ffd93d;
      --success: #4ecdc4;
      --error: #ff6b9d;
      --border: #2a2a3e;
      --shadow: rgba(0, 0, 0, 0.3);
    }
    
    body {
      font-family: 'Space Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }
    
    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 20px;
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    #themeToggle {
      display: block;
      margin: 0 auto 30px;
      padding: 12px 24px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 700;
    }
    
    #themeToggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow);
      border-color: var(--primary);
    }
    
    .controls, .quiz {
      background: var(--card);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 24px var(--shadow);
      border: 2px solid var(--border);
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--text);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    select, input[type="number"] {
      width: 100%;
      padding: 14px;
      margin-bottom: 20px;
      font-size: 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      transition: all 0.3s;
    }
    
    select:focus, input[type="number"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
    }
    
    .section-title {
      font-size: 1.2rem;
      margin: 25px 0 15px;
      color: var(--primary);
      font-family: 'Noto Sans JP', sans-serif;
      border-left: 4px solid var(--primary);
      padding-left: 12px;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .char-checkbox {
      position: relative;
    }
    
    .char-checkbox input[type="checkbox"] {
      position: absolute;
      opacity: 0;
    }
    
    .char-checkbox label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 8px;
      border: 2px solid var(--border);
      border-radius: 12px;
      text-align: center;
      font-size: 24px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      background: var(--bg);
      margin: 0;
      text-transform: none;
      letter-spacing: 0;
    }
    
    .char-checkbox input:checked + label {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      transform: scale(1.05);
    }
    
    .char-checkbox label:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    
    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(230, 57, 70, 0.3);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .quiz .char {
      font-size: 120px;
      text-align: center;
      margin: 30px 0;
      font-family: 'Noto Sans JP', sans-serif;
      animation: fadeInScale 0.5s ease-out;
    }
    
    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    .quiz input[type="text"] {
      width: 100%;
      padding: 18px;
      margin-bottom: 20px;
      font-size: 20px;
      border: 3px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      text-align: center;
      transition: all 0.3s;
    }
    
    .quiz input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.1);
    }
    
    .quiz input[type="text"]:disabled {
      opacity: 0.8;
      cursor: not-allowed;
    }
    
    .stats {
      display: flex;
      justify-content: space-around;
      margin-top: 25px;
      padding: 20px;
      background: var(--bg);
      border-radius: 12px;
      border: 2px solid var(--border);
    }
    
    .stat-item {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
    }
    
    .stat-item .emoji {
      font-size: 2rem;
      display: block;
      margin-bottom: 5px;
    }
    
    .stat-value {
      display: block;
      font-size: 2rem;
      margin-top: 5px;
    }
    
    .hidden {
      display: none;
    }
    
    .feedback {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 5rem;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 1000;
    }
    
    .feedback.show {
      transform: translate(-50%, -50%) scale(1);
    }
    
    .progress {
      margin-top: 20px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text);
      opacity: 0.7;
    }
    
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      
      .quiz .char {
        font-size: 80px;
      }
      
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>かな Quiz 🎌</h1>
    <button id="themeToggle">🌙 Modo Escuro</button>

    <div class="controls" id="setup">
      <label>Modo de estudo</label>
      <select id="mode">
        <option value="all">Hiragana + Katakana</option>
        <option value="hira">Só Hiragana</option>
        <option value="kata">Só Katakana</option>
      </select>

      <label>Repetições por caractere</label>
      <input type="number" id="repeat" min="1" max="10" value="3" />

      <div id="sections"></div>

      <button onclick="startQuiz()">Começar Quiz</button>
    </div>

    <div class="quiz hidden" id="quiz">
      <div class="progress" id="progress"></div>
      <div class="char" id="currentChar"></div>
      <input type="text" id="answer" placeholder="Digite o romaji" autocomplete="off" />
      <button onclick="submitAnswer()">Confirmar</button>

      <div class="stats">
        <div class="stat-item">
          <span class="emoji">✅</span>
          <span class="stat-value" id="hits">0</span>
        </div>
        <div class="stat-item">
          <span class="emoji">❌</span>
          <span class="stat-value" id="miss">0</span>
        </div>
      </div>
    </div>
  </div>

      const isDark = document.body.classList.contains('dark');

    // Renderizar seleção de caracteres
    function renderCharSelection() {
      const sections = document.getElementById('sections');
      sections.innerHTML = '';
      const mode = document.getElementById('mode').value;

      const groups = {
        'Hiragana Básico': c => c.type === 'hira' && c.group === 'basic',
        'Hiragana Dakuten (゛)': c => c.type === 'hira' && c.group === 'dakuten',
        'Hiragana Handakuten (゜)': c => c.type === 'hira' && c.group === 'handakuten',
        'Katakana Básico': c => c.type === 'kata' && c.group === 'basic',
        'Katakana Dakuten (゛)': c => c.type === 'kata' && c.group === 'dakuten',
        'Katakana Handakuten (゜)': c => c.type === 'kata' && c.group === 'handakuten'
      };

      Object.entries(groups).forEach(([title, filterFn]) => {
        const filtered = allChars.filter(c => {
          if (mode === 'hira' && c.type !== 'hira') return false;
          if (mode === 'kata' && c.type !== 'kata') return false;
          return filterFn(c);
        });

        if (!filtered.length) return;

        const h3 = document.createElement('h3');
        h3.className = 'section-title';
        h3.textContent = title;
        sections.appendChild(h3);

        const grid = document.createElement('div');
        grid.className = 'grid';

        filtered.forEach((c, idx) => {
          const charIdx = allChars.indexOf(c);
          const div = document.createElement('div');
          div.className = 'char-checkbox';
          div.innerHTML = `
            <input type="checkbox" id="char-${charIdx}" value="${charIdx}" checked>
            <label for="char-${charIdx}">${c.char}</label>
          `;
          grid.appendChild(div);
        });

        sections.appendChild(grid);
      });
    }

    document.getElementById('mode').onchange = renderCharSelection;
    renderCharSelection();

    // Shuffle array
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Iniciar quiz
    function startQuiz() {
      quizList = [];
      currentIndex = 0;
      const repeat = Number(document.getElementById('repeat').value);
      
      document.querySelectorAll('#sections input:checked').forEach(cb => {
        const c = allChars[cb.value];
        for (let i = 0; i < repeat; i++) {
          quizList.push(c);
        }
      });

      if (quizList.length === 0) {
        alert('Selecione pelo menos um caractere!');
        return;
      }

      shuffle(quizList);
      document.getElementById('setup').classList.add('hidden');
      document.getElementById('quiz').classList.remove('hidden');
      showNextChar();
    }

    // Mostrar próximo caractere
    function showNextChar() {
      if (currentIndex >= quizList.length) {
        alert(`Quiz finalizado!\n✅ Acertos: ${hits}\n❌ Erros: ${miss}`);
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('setup').classList.remove('hidden');
        return;
      }

      const progress = document.getElementById('progress');
      progress.textContent = `Questão ${currentIndex + 1} de ${quizList.length}`;
      
      document.getElementById('currentChar').textContent = quizList[currentIndex].char;
      document.getElementById('answer').value = '';
      document.getElementById('answer').focus();
    }

    // Mostrar feedback visual
    function showFeedback(isCorrect) {
      const feedback = document.getElementById('feedback');
      feedback.textContent = isCorrect ? '✅' : '❌';
      feedback.classList.add('show');
      
      setTimeout(() => {
        feedback.classList.remove('show');
      }, 500);
    }

    // Submeter resposta
    function submitAnswer() {
      const input = document.getElementById('answer').value.trim().toLowerCase();
      const current = quizList[currentIndex];

      if (!input) return;

      if (!perKana[current.char]) {
        perKana[current.char] = { hits: 0, miss: 0 };
      }

      if (input === current.romaji) {
        hits++;
        perKana[current.char].hits++;
        showFeedback(true);
        
        localStorage.setItem('kanaStats', JSON.stringify({ hits, miss, perKana }));
        document.getElementById('hits').textContent = hits;
        document.getElementById('miss').textContent = miss;

        currentIndex++;
        setTimeout(showNextChar, 300);
      } else {
        miss++;
        perKana[current.char].miss++;
        showFeedback(false);
        
        // Mostrar resposta correta
        const answerInput = document.getElementById('answer');
        answerInput.value = current.romaji;
        answerInput.style.borderColor = 'var(--error)';
        answerInput.style.background = 'rgba(239, 71, 111, 0.1)';
        answerInput.disabled = true;
        
        localStorage.setItem('kanaStats', JSON.stringify({ hits, miss, perKana }));
        document.getElementById('hits').textContent = hits;
        document.getElementById('miss').textContent = miss;

        // Adiciona o caractere errado no final da lista (não imediatamente após)
        quizList.push(current);

        // Espera 2 segundos antes de pular para o próximo
        setTimeout(() => {
          answerInput.style.borderColor = '';
          answerInput.style.background = '';
          answerInput.disabled = false;
          currentIndex++;
          showNextChar();
        }, 2000);
      }
    }

    // Enter para submeter
    document.getElementById('answer').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        submitAnswer();
      }
    });
  </script>
</body>
</html>
