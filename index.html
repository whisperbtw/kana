<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quiz Hiragana & Katakana</title>
        <link rel="stylesheet" href="src/styles/main.css" />
    </head>
    <body>
        <div class="container">
            <header class="app-header">
                <h1>かな Quiz 🎌</h1>
                <p class="subtitle">Treine hiragana e katakana com foco em velocidade e memória.</p>
                <section class="profile-card" id="profileCard" aria-label="Perfil de nivel">
                    <div class="profile-top">
                        <div class="profile-level">Nivel <span id="profileLevel">1</span></div>
                        <div class="profile-rank" id="profileRank">Bronze</div>
                    </div>
                    <div class="xp-track">
                        <div class="xp-fill" id="profileXpFill"></div>
                    </div>
                    <div class="profile-meta">
                        <span id="profileXpText">0 / 80 XP</span>
                        <span id="profileTotalXp">Total: 0 XP</span>
                    </div>
                </section>
            </header>

            <button id="themeToggle" class="theme-toggle" aria-label="Alternar tema">
                <svg
                    id="moonIcon"
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    fill="currentColor"
                    viewBox="0 0 256 256"
                >
                    <path
                        d="M233.54,142.23a8,8,0,0,0-8-2,88.08,88.08,0,0,1-109.8-109.8,8,8,0,0,0-10-10,104.84,104.84,0,0,0-52.91,37A104,104,0,0,0,136,224a103.09,103.09,0,0,0,62.52-20.88,104.84,104.84,0,0,0,37-52.91A8,8,0,0,0,233.54,142.23ZM188.9,190.34A88,88,0,0,1,65.66,67.11a89,89,0,0,1,31.4-26A106,106,0,0,0,96,56A104.11,104.11,0,0,0,200,160a106,106,0,0,0,14.92-1.06A89,89,0,0,1,188.9,190.34Z"
                    ></path>
                </svg>
                <svg
                    id="sunIcon"
                    class="hidden"
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    fill="currentColor"
                    viewBox="0 0 256 256"
                >
                    <path
                        d="M120,40V16a8,8,0,0,1,16,0V40a8,8,0,0,1-16,0Zm72,88a64,64,0,1,1-64-64A64.07,64.07,0,0,1,192,128Zm-16,0a48,48,0,1,0-48,48A48.05,48.05,0,0,0,176,128ZM58.34,69.66A8,8,0,0,0,69.66,58.34l-16-16A8,8,0,0,0,42.34,53.66Zm0,116.68-16,16a8,8,0,0,0,11.32,11.32l16-16a8,8,0,0,0-11.32-11.32ZM192,72a8,8,0,0,0,5.66-2.34l16-16a8,8,0,0,0-11.32-11.32l-16,16A8,8,0,0,0,192,72Zm5.66,114.34a8,8,0,0,0-11.32,11.32l16,16a8,8,0,0,0,11.32-11.32ZM48,128a8,8,0,0,0-8-8H16a8,8,0,0,0,0,16H40A8,8,0,0,0,48,128Zm80,80a8,8,0,0,0-8,8v24a8,8,0,0,0,16,0V216A8,8,0,0,0,128,208Zm112-88H216a8,8,0,0,0,0,16h24a8,8,0,0,0,0-16Z"
                    ></path>
                </svg>
            </button>

            <button id="exitBtn" class="exit-btn hidden" aria-label="Sair do quiz">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    fill="currentColor"
                    viewBox="0 0 256 256"
                >
                    <path
                        d="M120,216a8,8,0,0,1-8,8H48a8,8,0,0,1-8-8V40a8,8,0,0,1,8-8h64a8,8,0,0,1,0,16H56V208h56A8,8,0,0,1,120,216Zm109.66-93.66-40-40a8,8,0,0,0-11.32,11.32L204.69,120H112a8,8,0,0,0,0,16h92.69l-26.35,26.34a8,8,0,0,0,11.32,11.32l40-40A8,8,0,0,0,229.66,122.34Z"
                    ></path>
                </svg>
            </button>

            <button id="restartBtn" class="restart-btn hidden" aria-label="Reiniciar quiz">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    fill="currentColor"
                    viewBox="0 0 256 256"
                >
                    <path
                        d="M224,128a8,8,0,0,1-8,8H139.31l26.35,26.34a8,8,0,0,1-11.32,11.32l-40-40a8,8,0,0,1,0-11.32l40-40a8,8,0,0,1,11.32,11.32L139.31,120H216A8,8,0,0,1,224,128ZM112,48a8,8,0,0,0,0-16H48a8,8,0,0,0-8,8v62.06a8,8,0,0,0,16,0V48Z"
                    ></path>
                </svg>
            </button>

            <main class="app-main">
                <div class="controls" id="setup">
                    <label>Modo de estudo</label>
                    <select id="mode">
                        <option value="all">Hiragana + Katakana</option>
                        <option value="hira">Só Hiragana</option>
                        <option value="kata">Só Katakana</option>
                    </select>

                    <label>Tipo de quiz</label>
                    <select id="quizType">
                        <option value="normal">Normal (Ver caractere → Digitar romaji)</option>
                        <option value="reverse">Reverso (Ver romaji → Clicar caractere)</option>
                        <option value="combo">Combo (Ver 3 caracteres → Digitar romaji junto)</option>
                        <option value="study">Estudo (Aprender + Múltipla escolha)</option>
                    </select>

                    <label>Repetições por caractere</label>
                    <input type="number" id="repeat" min="1" max="10" value="3" />

                    <div id="sections"></div>

                    <button onclick="startQuiz()">Começar Quiz</button>
                </div>

                <div class="quiz hidden" id="quiz">
                    <div class="progress" id="progress"></div>
                    <div class="timer" id="timer">⏱️ 00:00</div>

                    <!-- Modo Normal -->
                    <div id="normalMode">
                        <div class="char" id="currentChar"></div>
                        <input type="text" id="answer" placeholder="Digite o romaji" autocomplete="off" />
                        <button onclick="submitAnswer()">Confirmar</button>
                    </div>

                    <!-- Modo Reverso -->
                    <div id="reverseMode" class="hidden">
                        <div class="romaji-display" id="romajiDisplay"></div>
                        <div class="char-options" id="charOptions"></div>
                    </div>

                    <!-- Modo Combo -->
                    <div id="comboMode" class="hidden">
                        <div class="combo-chars" id="comboChars"></div>
                        <input
                            type="text"
                            id="comboAnswer"
                            placeholder="Digite o romaji dos caracteres"
                            autocomplete="off"
                        />
                        <button onclick="submitComboAnswer()">Confirmar</button>
                    </div>

                    <!-- Modo Estudo -->
                    <div id="studyMode" class="hidden">
                        <div class="study-teaching" id="studyTeaching"></div>
                        <div class="study-char" id="studyChar"></div>
                        <div class="study-options" id="studyOptions"></div>
                    </div>
                </div>
            </main>
        </div>

        <div class="feedback" id="feedback"></div>

        <script type="module" src="src/js/main.js"></script>
    </body>
</html>
